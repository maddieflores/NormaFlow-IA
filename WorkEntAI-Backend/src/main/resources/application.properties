spring.application.name=backend

# ── IA (Groq via OpenAI-compatible API) ──────────────────────────────────────
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=${AI_MODEL:llama-3.3-70b-versatile}

# ── IA (Ollama - Ejecución Local Offline) ──────────────────────────────────────
spring.ai.ollama.base-url=${OLLAMA_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:llama3}

# ── MongoDB ───────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI}

# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.address=0.0.0.0

# ── Logs ──────────────────────────────────────────────────────────────────────
logging.level.org.mongodb.driver=WARN
logging.level.org.springframework=WARN
logging.level.com.workflow=INFO

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Firebase Cloud Messaging (FCM) ────────────────────────────────────────────
fcm.enabled=${FCM_ENABLED:true}

# ── Actuator (health check para Render) ───────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── CORS ──────────────────────────────────────────────────────────────────────
# Origenes permitidos: local + produccion en Netlify
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── Amazon S3 (Ciclo 2 - CU-24 al 27) ────────────────────────────────────────
# IMPORTANTE: Define estas variables en tu .env o en las vars de entorno de Render/EC2.
# NUNCA pongas las credenciales directamente aqui (seguridad).
aws.s3.access-key=${AWS_ACCESS_KEY_ID}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:system-workent-ai-files}
# Duracion en minutos de las URLs pre-firmadas para descarga
aws.s3.presigned-url-expiration-minutes=${AWS_PRESIGNED_EXPIRATION:60}

# ── Upload de archivos ────────────────────────────────────────────────────────
# Tamano maximo de archivo: 50 MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
